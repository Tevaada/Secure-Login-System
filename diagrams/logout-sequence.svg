    <style>
      text{font-family:Arial,sans-serif}.bg{fill:#f4f6f8}.card{fill:#fff;stroke:#d9e1dd;stroke-width:1.5}.title{font-size:30px;font-weight:800;fill:#17201b}.sub{font-size:15px;fill:#66736c}.name{font-size:15px;font-weight:800;fill:#17201b}.type{font-size:12px;font-weight:700;fill:#66736c}.life{stroke:#aebbb5;stroke-width:2;stroke-dasharray:8 8}.msg{stroke:#176b49;stroke-width:2.4;marker-end:url(#arrow)}.return{stroke:#66736c;stroke-width:2.1;stroke-dasharray:7 5;marker-start:url(#ret)}.label{font-size:14px;font-weight:700;fill:#17201b}.note{font-size:12px;font-weight:600;fill:#66736c}.act{fill:#e7f4ed;stroke:#176b49;stroke-width:1.3}.icon{fill:#fff;stroke:#176b49;stroke-width:2.4}.icon2{fill:#fff;stroke:#0f4d34;stroke-width:2.4}.db{fill:#fff8e6;stroke:#0f4d34;stroke-width:2.4}.head{fill:#176b49}.head2{fill:#0f4d34}.white{fill:#fff}.step{fill:#176b49}.stepText{font-size:11px;font-weight:800;fill:#fff}
