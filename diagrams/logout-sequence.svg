  </defs><rect class="bg" width="1000" height="680"/><rect class="card" x="35" y="30" width="930" height="610" rx="18"/><text class="title" x="70" y="78">Logout Sequence</text><text class="sub" x="70" y="104">System clears the JWT cookie and returns user to login page.</text><g transform="translate(80 145)"><circle class="icon" cx="55" cy="18" r="16"/><line class="icon" x1="55" y1="34" x2="55" y2="78"/><line class="icon" x1="25" y1="50" x2="85" y2="50"/><line class="icon" x1="55" y1="78" x2="30" y2="112"/><line class="icon" x1="55" y1="78" x2="80" y2="112"/><text class="name" x="55" y="145" text-anchor="middle">User</text><text class="type" x="55" y="164" text-anchor="middle">&lt;&lt;actor&gt;&gt;</text></g><g transform="translate(340 145)"><rect class="icon" x="0" y="10" width="120" height="82" rx="8"/><line class="icon" x1="0" y1="32" x2="120" y2="32"/><circle class="head" cx="18" cy="21" r="4"/><circle class="head" cx="32" cy="21" r="4"/><circle class="head" cx="46" cy="21" r="4"/><text class="name" x="60" y="125" text-anchor="middle">Browser</text><text class="type" x="60" y="144" text-anchor="middle">&lt;&lt;boundary&gt;&gt;</text></g><g transform="translate(620 145)"><circle class="icon2" cx="60" cy="52" r="43"/><path class="icon2" d="M38 52 h44 M60 30 v44"/><text class="name" x="60" y="125" text-anchor="middle">Server</text><text class="type" x="60" y="144" text-anchor="middle">&lt;&lt;control&gt;&gt;</text></g>
