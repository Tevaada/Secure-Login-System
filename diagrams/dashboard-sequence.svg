<svg width="1200" height="780" viewBox="0 0 1200 780" xmlns="http://www.w3.org/2000/svg">  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#176b49"/></marker>
    <marker id="ret" markerWidth="10" markerHeight="8" refX="1" refY="4" orient="auto"><path d="M10,0 L0,4 L10,8 Z" fill="#66736c"/></marker>
    <style>
      text{font-family:Arial,sans-serif}.bg{fill:#f4f6f8}.card{fill:#fff;stroke:#d9e1dd;stroke-width:1.5}.title{font-size:30px;font-weight:800;fill:#17201b}.sub{font-size:15px;fill:#66736c}.name{font-size:15px;font-weight:800;fill:#17201b}.type{font-size:12px;font-weight:700;fill:#66736c}.life{stroke:#aebbb5;stroke-width:2;stroke-dasharray:8 8}.msg{stroke:#176b49;stroke-width:2.4;marker-end:url(#arrow)}.return{stroke:#66736c;stroke-width:2.1;stroke-dasharray:7 5;marker-start:url(#ret)}.label{font-size:14px;font-weight:700;fill:#17201b}.note{font-size:12px;font-weight:600;fill:#66736c}.act{fill:#e7f4ed;stroke:#176b49;stroke-width:1.3}.icon{fill:#fff;stroke:#176b49;stroke-width:2.4}.icon2{fill:#fff;stroke:#0f4d34;stroke-width:2.4}.db{fill:#fff8e6;stroke:#0f4d34;stroke-width:2.4}.head{fill:#176b49}.head2{fill:#0f4d34}.white{fill:#fff}.step{fill:#176b49}.stepText{font-size:11px;font-weight:800;fill:#fff}
    </style>
  </defs><rect class="bg" width="1200" height="780"/><rect class="card" x="35" y="30" width="1130" height="710" rx="18"/>
<text class="title" x="70" y="78">Dashboard Auth Check Sequence</text><text class="sub" x="70" y="104">System restores session by verifying JWT cookie and loading user profile.</text><g transform="translate(80 145)"><circle class="icon" cx="55" cy="18" r="16"/><line class="icon" x1="55" y1="34" x2="55" y2="78"/><line class="icon" x1="25" y1="50" x2="85" y2="50"/><line class="icon" x1="55" y1="78" x2="30" y2="112"/><line class="icon" x1="55" y1="78" x2="80" y2="112"/><text class="name" x="55" y="145" text-anchor="middle">User</text><text class="type" x="55" y="164" text-anchor="middle">&lt;&lt;actor&gt;&gt;</text></g><g transform="translate(305 145)"><rect class="icon" x="0" y="10" width="120" height="82" rx="8"/><line class="icon" x1="0" y1="32" x2="120" y2="32"/><circle class="head" cx="18" cy="21" r="4"/><circle class="head" cx="32" cy="21" r="4"/><circle class="head" cx="46" cy="21" r="4"/><text class="name" x="60" y="125" text-anchor="middle">Browser</text><text class="type" x="60" y="144" text-anchor="middle">&lt;&lt;boundary&gt;&gt;</text></g><g transform="translate(535 145)"><circle class="icon2" cx="60" cy="52" r="43"/><path class="icon2" d="M38 52 h44 M60 30 v44"/><text class="name" x="60" y="125" text-anchor="middle">Server</text><text class="type" x="60" y="144" text-anchor="middle">&lt;&lt;control&gt;&gt;</text></g><g transform="translate(765 145)"><circle class="icon2" cx="60" cy="52" r="43"/><path class="icon2" d="M38 52 h44 M60 30 v44"/><text class="name" x="60" y="125" text-anchor="middle">JWT</text><text class="type" x="60" y="144" text-anchor="middle">&lt;&lt;control&gt;&gt;</text></g><g transform="translate(985 145)"><ellipse class="db" cx="60" cy="20" rx="54" ry="17"/><rect class="db" x="6" y="20" width="108" height="76"/><ellipse class="db" cx="60" cy="96" rx="54" ry="17"/><text class="name" x="60" y="135" text-anchor="middle">SQLite DB</text><text class="type" x="60" y="154" text-anchor="middle">&lt;&lt;entity&gt;&gt;</text></g><line class="life" x1="135" y1="310" x2="135" y2="710"/><line class="life" x1="365" y1="290" x2="365" y2="710"/><line class="life" x1="595" y1="290" x2="595" y2="710"/><line class="life" x1="825" y1="290" x2="825" y2="710"/><line class="life" x1="1045" y1="305" x2="1045" y2="710"/>
<rect class="act" x="358" y="335" width="14" height="330" rx="4"/><rect class="act" x="588" y="365" width="14" height="280" rx="4"/><rect class="act" x="818" y="485" width="14" height="95" rx="4"/><rect class="act" x="1038" y="430" width="14" height="145" rx="4"/>
<circle class="step" cx="120" cy="345" r="13"/><text class="stepText" x="120" y="349" text-anchor="middle">1</text><line class="msg" x1="135" y1="345" x2="358" y2="345"/><text class="label" x="245" y="331" text-anchor="middle">Open dashboard</text>
<circle class="step" cx="350" cy="390" r="13"/><text class="stepText" x="350" y="394" text-anchor="middle">2</text><line class="msg" x1="372" y1="390" x2="588" y2="390"/><text class="label" x="480" y="376" text-anchor="middle">GET /api/me with cookie</text>
<circle class="step" cx="580" cy="455" r="13"/><text class="stepText" x="580" y="459" text-anchor="middle">3</text><line class="msg" x1="602" y1="455" x2="818" y2="455"/><text class="label" x="710" y="441" text-anchor="middle">Verify token</text><text class="note" x="710" y="472" text-anchor="middle">jwt.verify()</text>
<line class="return" x1="602" y1="515" x2="818" y2="515"/><text class="label" x="710" y="501" text-anchor="middle">Return decoded user id</text>
<circle class="step" cx="580" cy="575" r="13"/><text class="stepText" x="580" y="579" text-anchor="middle">4</text><line class="msg" x1="602" y1="575" x2="1038" y2="575"/><text class="label" x="820" y="561" text-anchor="middle">Load user profile</text><text class="note" x="820" y="592" text-anchor="middle">SELECT id, name, email, created_at</text>
<line class="return" x1="602" y1="635" x2="1038" y2="635"/><text class="label" x="820" y="621" text-anchor="middle">Return user data</text>
<line class="return" x1="372" y1="685" x2="588" y2="685"/><text class="label" x="480" y="671" text-anchor="middle">200 OK { user }</text><line class="return" x1="135" y1="720" x2="358" y2="720"/><text class="label" x="245" y="706" text-anchor="middle">Render dashboard</text>
